async function startSession() {
  if (currentMode === 'learn' || currentMode === 'learn-katakana') {
    const history = loadSkillHistory();
    const isKatakana = currentMode === 'learn-katakana';
    const groupIdx = isKatakana ? (history.currentKatakanaGroup || 0) : (history.currentGroup || 0);
    const groups = isKatakana ? katakanaGroups : hiraganaGroups;
    const pairs = isKatakana ? katakanaConfusablePairs : confusablePairs;
    exercises = generateLearningSession(groupIdx, groups, pairs);
  } else if (currentMode === 'anchor') {
    exercises = generateAnchorDrill();
  } else if (currentMode === 'action') {
    exercises = generateScenarioDrill(scenarios[0]);
  } else {
    exercises = generateExercises(n5Content, 13);
  }
  currentIndex = 0;
  sessionResults = [];
  answered = false;
  reinforceQueue = [];
  correctStreak = 0;
  drillFromScene = false;
  progressFill.classList.remove('final-stretch');

  const log = document.getElementById('session-review-log');
  if (log) log.innerHTML = '';

  // Close drawer if open
  const drawer = document.getElementById('settings-drawer');
  if (drawer) drawer.classList.remove('open');

  showView('view-session');
  renderExercise();
}

// ── Learning Session Generation ─────────────────────
function getWordsUpToGroup(groupIdx, groups) {
  groups = groups || hiraganaGroups;
  const words = [];
  for (let i = 0; i <= groupIdx && i < groups.length; i++) {
    for (const w of groups[i].words) {
      words.push({ ...w, _groupIdx: i });
    }
  }
  return words;
}

function normalizeRomaji(input) {
  let s = input.toLowerCase().trim();
  // Accept common alternative romanizations
  s = s.replace(/si/g, 'shi');
  s = s.replace(/ti/g, 'chi');
  s = s.replace(/tu/g, 'tsu');
  s = s.replace(/hu/g, 'fu');
  s = s.replace(/sy/g, 'sh');
  s = s.replace(/ty/g, 'ch');
  s = s.replace(/nb/g, 'mb');
  s = s.replace(/np/g, 'mp');
  return s;
}

/**
 * Generate a drill session for anchor words.
 * FSRS-driven: due items first, then weakest, then new.
 * 3 exercise types: context→produce, reading recall, meaning recall.
 */
function generateAnchorDrill() {
  const fsrsState = loadFSRSState();
  const words = [...anchorWords];

  // Ensure FSRS cards exist for all anchor words
  for (const w of words) {
    const key = `anchor_${w.id}`;
    if (!fsrsState[key]) {
      fsrsState[key] = createCard(key, 'anchor');
    }
  }
  saveFSRSState(fsrsState);

  // Sort: due items first, then lowest retrievability, then NEW
  words.sort((a, b) => {
    const cardA = fsrsState[`anchor_${a.id}`];
    const cardB = fsrsState[`anchor_${b.id}`];
    const dueA = cardA.state !== NEW && isDue(cardA);
    const dueB = cardB.state !== NEW && isDue(cardB);
    if (dueA && !dueB) return -1;
    if (!dueA && dueB) return 1;
    const rA = cardA.state === NEW ? 0 : retrievability(cardA);
    const rB = cardB.state === NEW ? 0 : retrievability(cardB);
    return rA - rB;
  });

  // Take up to 8 items per session
  const sessionItems = words.slice(0, 8);

  const introExercises = [];
  const drillExercises = [];

  for (const w of sessionItems) {
    const key = `anchor_${w.id}`;
    const card = fsrsState[key];

    // NEW items get an intro card first
    if (card && card.state === NEW) {
      introExercises.push({
        type: 'anchor_intro',
        japanese: w.japanese,
        romaji: w.romaji,
        english: w.english,
        context: w.context,
        category: w.category,
        _anchorKey: key,
      });
    }

    // Context → Produce: hear the situation, type the anchor word
    drillExercises.push({
      type: 'anchor_context',
      context: w.context,
      correct_kana: w.japanese.replace(/[？！?!]/g, ''),
      correct_romaji: w.romaji.replace(/[？！?!]/g, ''),
      correct_display: w.japanese,
      english: w.english,
      accepts: w.accepts,
      _anchorKey: key,
    });

    // Reading Recall: see kana, type romaji
    drillExercises.push({
      type: 'anchor_read',
      japanese: w.japanese,
      correct_romaji: w.romaji.replace(/[？！?!]/g, ''),
      english: w.english,
      _anchorKey: key,
    });

    // Meaning Recall: see English, type kana
    drillExercises.push({
      type: 'anchor_produce',
      english: w.english,
      context: w.context,
      correct_kana: w.japanese.replace(/[？！?!]/g, ''),
      correct_romaji: w.romaji.replace(/[？！?!]/g, ''),
      correct_display: w.japanese,
      accepts: w.accepts,
      _anchorKey: key,
    });
  }

  // Shuffle drills, intros first
  for (let i = drillExercises.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [drillExercises[i], drillExercises[j]] = [drillExercises[j], drillExercises[i]];
  }

  return [...introExercises, ...drillExercises];
}

/**
 * Generate a drill session from a scenario's prerequisite phrases.
 * FSRS-driven: due items first, then weakest, then new.
 */
function generateScenarioDrill(scenario, filterPrereqIds) {
  const fsrsState = loadFSRSState();
  const exercises = [];
  let prereqs = [...scenario.prereqs];

  // If filtering to specific prereqs (e.g. missed from scene), apply filter
  if (filterPrereqIds) {
    prereqs = prereqs.filter(p => filterPrereqIds.includes(p.id));
  }

  // Ensure FSRS cards exist for all prereqs
  for (const p of prereqs) {
    const key = `scene_${scenario.id}_${p.id}`;
    if (!fsrsState[key]) {
      fsrsState[key] = createCard(key, 'scene');
    }
  }
  saveFSRSState(fsrsState);

  // Sort: due items first (most overdue), then by lowest retrievability
  prereqs.sort((a, b) => {
    const cardA = fsrsState[`scene_${scenario.id}_${a.id}`];
    const cardB = fsrsState[`scene_${scenario.id}_${b.id}`];
    const dueA = cardA.state !== NEW && isDue(cardA);
    const dueB = cardB.state !== NEW && isDue(cardB);
    if (dueA && !dueB) return -1;
    if (!dueA && dueB) return 1;
    const rA = cardA.state === NEW ? 0 : retrievability(cardA);
    const rB = cardB.state === NEW ? 0 : retrievability(cardB);
    return rA - rB;
  });

  // Take up to 8 items per session
  const sessionItems = prereqs.slice(0, 8);

  // Build exercises: intro cards for NEW items, then recognition, then production
  const introExercises = [];
  const drillExercises = [];

  for (const p of sessionItems) {
    const key = `scene_${scenario.id}_${p.id}`;
    const card = fsrsState[key];

    // NEW items get an intro card first
    if (card && card.state === NEW) {
      introExercises.push({
        type: 'scene_intro',
        japanese: p.japanese,
        romaji: p.romaji || null,
        english: p.english,
        _sceneKey: key,
      });
    }

    // Recognition: see Japanese → type English
    drillExercises.push({
      type: 'reading_recall',
      japanese: p.japanese,
      romaji: p.romaji || null,
      correct_answer: p.english,
      explanation: `${p.japanese}${p.romaji ? ' (' + p.romaji + ')' : ''} = ${p.english}`,
      _sceneKey: key,
    });

    // Production: see English → type Japanese
    drillExercises.push({
      type: 'vocab_recall',
      english: p.english,
      correct_kana: p.japanese,
      correct_romaji: p.romaji || null,
      correct_display: p.japanese,
      explanation: `${p.english} → ${p.japanese}${p.romaji ? ' (' + p.romaji + ')' : ''}`,
      _sceneKey: key,
    });
  }

  // Intro cards first (in order), then shuffled drills
  return [...introExercises, ...shuffle(drillExercises)];
}

function getWordWeakness(word, fsrsState, prefix) {
  // Weakness = lowest retrievability among the word's characters
  let minR = 1;
  for (const ch of word.kana) {
    const card = fsrsState[`${prefix}${ch}`];
    if (!card || card.state === NEW) return 0; // never practiced = maximally weak
    const r = retrievability(card);
    if (r < minR) minR = r;
  }
  return minR;
}

function isGroupLearned(group, fsrsState, prefix) {
  // Group is learned when all its characters are above 0.7 retrievability
  for (const ch of group.characters) {
    const card = fsrsState[`${prefix}${ch.kana}`];
    if (!card || card.state === NEW) return false;
    if (retrievability(card) < 0.7) return false;
  }
  return true;
}

function generateLearningSession(groupIdx, groups, confusables) {
  groups = groups || hiraganaGroups;
  confusables = confusables || confusablePairs;
  const group = groups[groupIdx];
  const allWords = getWordsUpToGroup(groupIdx, groups);
  const currentGroupWords = [...group.words];
  const exerciseList = [];
  const isKatakana = groups === katakanaGroups;
  const prefix = isKatakana ? 'kata_' : 'hira_';
  const fsrsState = loadFSRSState();

  // Sort words by weakness — weakest characters first
  currentGroupWords.sort((a, b) => getWordWeakness(a, fsrsState, prefix) - getWordWeakness(b, fsrsState, prefix));

  // Intro card only on first session (not on Continue)
  if (!kanaContinueSession) {
    // Groups 1-9 hiragana: individual character intros with stroke animation + origin story
    if (!isKatakana && group.id <= 9) {
      for (let ci = 0; ci < group.characters.length; ci++) {
        exerciseList.push({
          type: 'char_intro',
          character: group.characters[ci],
          charIndex: ci,
          charTotal: group.characters.length,
          groupName: group.name,
          groupId: group.id,
          words: group.words,
          _isIntro: true,
        });
      }
    } else {
      // Katakana and groups 10-12: grid overview
      exerciseList.push({
        type: 'hiragana_intro',
        groupName: group.name,
        groupId: group.id,
        characters: group.characters,
        _isIntro: true,
        _isKatakana: isKatakana,
      });
    }
  }

  // Intro cards for words with any NEW characters
  for (const word of currentGroupWords) {
    const hasNew = word.kana.split('').some(ch => {
      const card = fsrsState[`${prefix}${ch}`];
      return !card || card.state === NEW;
    });
    if (hasNew) {
      exerciseList.push({
        type: 'word_intro',
        japanese: word.kana,
        romaji: word.romaji,
        english: word.english,
        breakdown: word.breakdown,
        _isKatakana: isKatakana,
      });
    }
  }

  // Build varied exercises — weak words get more types
  const exerciseTypes = ['read', 'spot', 'reverse', 'listen', 'build', 'produce'];

  for (let i = 0; i < currentGroupWords.length; i++) {
    const word = currentGroupWords[i];
    // Weak words (first half) get 3 types, strong words get 1-2
    const count = i < currentGroupWords.length / 2 ? 3 : (1 + (Math.random() < 0.4 ? 1 : 0));
    const types = shuffle(exerciseTypes).slice(0, count);
    for (const t of types) {
      let ex;
      if (t === 'read') {
        ex = makeHiraganaRead(word);
      } else if (t === 'spot' && currentGroupWords.length >= 4) {
        ex = makeHiraganaSpot(word, allWords, currentGroupWords);
      } else if (t === 'reverse' && currentGroupWords.length >= 4) {
        ex = makeHiraganaReverse(word, currentGroupWords);
      } else if (t === 'listen') {
        ex = makeHiraganaListen(word);
      } else if (t === 'build' && word.breakdown.length >= 2) {
        ex = makeHiraganaBuild(word);
      } else if (t === 'produce') {
        ex = makeHiraganaProduce(word);
      }
      if (ex) {
        if (isKatakana) ex._isKatakana = true;
        exerciseList.push(ex);
      }
    }
  }

  // Confusable pair exercises if available
  const availablePairs = confusables.filter(p => p.availableAfterGroup <= groupIdx + 1);
  for (const pair of availablePairs) {
    const ex = makeHiraganaConfusable(pair);
    if (isKatakana) ex._isKatakana = true;
    exerciseList.push(ex);
  }

  // Real N5 vocab readable with known characters
  if (!isKatakana) {
    const readableVocab = getReadableN5Vocab(groupIdx, groups);
    if (readableVocab.length >= 4) {
      const vocabSample = pickN(readableVocab, Math.min(4, readableVocab.length));
      for (const v of vocabSample) {
        exerciseList.push(makeHiraganaVocab(v, readableVocab));
      }
    }
  }

  // Separate intros from drills — intros first, then capped shuffled drills
  const intros = exerciseList.filter(e => e._isIntro || e.type === 'word_intro' || e.type === 'char_intro');
  const drills = exerciseList.filter(e => !e._isIntro && e.type !== 'word_intro' && e.type !== 'char_intro');
  const capped = shuffle(drills).slice(0, 8);
  return [...intros, ...smartInterleave(capped)];
}

function makeHiraganaRead(word) {
  return {
    type: 'hiragana_read',
    japanese: word.kana,
    correct_answer: word.romaji,
    english: word.english,
    breakdown: word.breakdown,
    explanation: word.breakdown.map(b => `${b.char} = ${b.romaji}`).join(', ') + ` \u2192 ${word.romaji} = "${word.english}"`,
    _word: word,
  };
}

function makeHiraganaSpot(word, allWords, currentGroupWords) {
  // Prefer distractors from the same group; fall back to full pool if not enough
  const sameGroup = (currentGroupWords || allWords).filter(w => w.kana !== word.kana);
  const pool = sameGroup.length >= 3 ? sameGroup : allWords.filter(w => w.kana !== word.kana);
  const distractors = pickN(pool, 3).map(w => w.kana);
  const options = shuffle([word.kana, ...distractors]);
  return {
    type: 'hiragana_spot',
    english: word.english,
    romaji: word.romaji,
    correct_answer: word.kana,
    options,
    breakdown: word.breakdown,
    explanation: word.breakdown.map(b => `${b.char} = ${b.romaji}`).join(', ') + ` \u2192 ${word.romaji} = "${word.english}"`,
    _word: word,
  };
}

function makeHiraganaReverse(word, currentGroupWords) {
  const others = currentGroupWords.filter(w => w.english !== word.english);
  const pool = others.length >= 3 ? others : currentGroupWords.filter(w => w.english !== word.english);
  const distractors = pickN(pool, 3).map(w => w.english);
  const options = shuffle([word.english, ...distractors]);
  return {
    type: 'hiragana_reverse',
    japanese: word.kana,
    romaji: word.romaji,
    correct_answer: word.english,
    options,
    breakdown: word.breakdown,
    explanation: word.breakdown.map(b => `${b.char} = ${b.romaji}`).join(', ') + ` \u2192 ${word.romaji} = "${word.english}"`,
    _word: word,
  };
}

function makeHiraganaListen(word) {
  return {
    type: 'hiragana_listen',
    japanese: word.kana,
    correct_answer: word.romaji,
    english: word.english,
    breakdown: word.breakdown,
    explanation: word.breakdown.map(b => `${b.char} = ${b.romaji}`).join(', ') + ` \u2192 ${word.romaji} = "${word.english}"`,
    _word: word,
  };
}

function makeHiraganaConfusable(pair) {
  // Randomly pick which character to ask about
  const askAbout = Math.random() < 0.5 ? pair.a : pair.b;
  const other = askAbout === pair.a ? pair.b : pair.a;
  return {
    type: 'hiragana_confusable',
    targetRomaji: askAbout.romaji,
    options: shuffle([askAbout, other]),
    correct_answer: askAbout.kana,
    hint: pair.hint,
    explanation: `${askAbout.kana} = ${askAbout.romaji}, ${other.kana} = ${other.romaji}. ${pair.hint}`,
  };
}

function makeHiraganaBuild(word) {
  // Scramble the characters from the breakdown
  const chars = word.breakdown.map(b => b.char);
  let scrambled = shuffle(chars);
  let attempts = 0;
  while (scrambled.join('') === chars.join('') && attempts < 10) {
    scrambled = shuffle(chars);
    attempts++;
  }
  return {
    type: 'hiragana_build',
    english: word.english,
    romaji: word.romaji,
    characters: scrambled,
    correct_answer: word.kana,
    breakdown: word.breakdown,
    explanation: word.breakdown.map(b => `${b.char} = ${b.romaji}`).join(', ') + ` \u2192 ${word.romaji} = "${word.english}"`,
    _word: word,
  };
}

/**
 * Hiragana Produce: See romaji → type the kana word.
 * Production direction — forces recall of character shapes.
 */
function makeHiraganaProduce(word) {
  return {
    type: 'hiragana_produce',
    romaji: word.romaji,
    english: word.english,
    correct_answer: word.kana,
    breakdown: word.breakdown,
    explanation: word.breakdown.map(b => `${b.romaji} → ${b.char}`).join(', ') + ` = ${word.kana} = "${word.english}"`,
    _word: word,
    _hiraChars: word.breakdown.map(b => b.char),
  };
}

/**
 * Hiragana Vocab: Real N5 vocabulary filtered to only use known hiragana.
 * Bridges "learning symbols" → "reading real Japanese."
 */
function makeHiraganaVocab(vocabItem, allReadableVocab) {
  return {
    type: 'hiragana_vocab',
    japanese: vocabItem.kana,
    romaji: vocabItem.romaji,
    correct_answer: vocabItem.english,
    options: (() => {
      const others = allReadableVocab.filter(v => v.english !== vocabItem.english);
      const distractors = pickN(others, 3).map(v => v.english);
      return shuffle([vocabItem.english, ...distractors]);
    })(),
    explanation: `${vocabItem.kana} (${vocabItem.romaji}) = ${vocabItem.english}`,
    _hiraChars: [...vocabItem.kana],
  };
}

/**
 * Get N5 vocab readable with only the hiragana characters learned up to groupIdx.
 */
function getReadableN5Vocab(groupIdx, groups) {
  // Build set of known hiragana characters
  const knownChars = new Set();
  for (let i = 0; i <= groupIdx && i < groups.length; i++) {
    for (const ch of groups[i].characters) {
      knownChars.add(ch.kana);
    }
  }
  // Small kana used in combos
  knownChars.add('っ'); knownChars.add('ゃ'); knownChars.add('ゅ'); knownChars.add('ょ');
  // Long vowel mark
  knownChars.add('ー');

  // Filter N5 vocab: every character in the kana must be in knownChars
  const readable = [];
  for (const lesson of n5Content.lessons) {
    for (const v of lesson.vocabulary) {
      const kana = v.kana;
      if (!kana || kana.length === 0) continue;
      // Skip words with katakana or kanji
      let allKnown = true;
      for (const ch of kana) {
        if (!knownChars.has(ch)) { allKnown = false; break; }
      }
      if (allKnown && kana.length >= 2) {
        readable.push(v);
      }
    }
  }
  return readable;
}

// Learning mode reinforcement: wrong answers come back as a different type
function makeLearningReinforcement(wrongEx) {
  const word = wrongEx._word;
  if (!word) return null;
  const wrongType = wrongEx.type;
  const alternatives = ['hiragana_read', 'hiragana_listen', 'hiragana_build', 'hiragana_produce'].filter(t => t !== wrongType);
  const newType = alternatives[Math.floor(Math.random() * alternatives.length)];
  if (newType === 'hiragana_read') return makeHiraganaRead(word);
  if (newType === 'hiragana_listen') return makeHiraganaListen(word);
  if (newType === 'hiragana_build' && word.breakdown.length >= 2) return makeHiraganaBuild(word);
  if (newType === 'hiragana_produce') return makeHiraganaProduce(word);
  return makeHiraganaRead(word);
}

function renderExercise() {
  if (currentIndex >= exercises.length) {
    finishSession();
    return;
  }

  answered = false;
  btnAction.textContent = 'skip';
  btnAction.classList.add('btn-skip-state');
  btnAction.classList.remove('btn-next-state');
  btnAction.disabled = false;

  // Update progress
  const total = exercises.length;
  progressLabel.textContent = `${currentIndex + 1} / ${total}`;
  progressFill.style.width = `${((currentIndex) / total) * 100}%`;

  const ex = exercises[currentIndex];

  // Directional slide transition — speeds up on streaks
  exerciseCard.classList.remove('slide-in', 'slide-in-fast');
  exerciseCard.classList.add('slide-out');
  const transitionDelay = correctStreak >= 5 ? 120 : correctStreak >= 3 ? 150 : 200;

  // Final stretch indicator
  if (currentIndex >= total - 2 && total > 3) {
    progressFill.classList.add('final-stretch');
  }

  setTimeout(() => {
    exerciseCard.classList.remove('slide-out');
    renderExerciseContent(ex);
    exerciseCard.classList.add(correctStreak >= 3 ? 'slide-in-fast' : 'slide-in');
  }, transitionDelay);
}

    sentence_build: 'Sentence Building',
    reading: 'Reading',
    listening: 'Listening',
    pronunciation: 'Pronunciation',
    vocab_recall: 'Recall',
    particle_recall: 'Particle Recall',
    reading_recall: 'Translation',
    hiragana_read: 'Read It',
    hiragana_spot: 'Spot It',
    hiragana_reverse: 'Read & Choose',
    hiragana_listen: 'Listen & Type',
    hiragana_confusable: 'Look-Alikes',
    hiragana_build: 'Build the Word',
    hiragana_produce: 'Type Kana',
    hiragana_vocab: 'Read Real Words',
    scene_intro: 'New Phrase',
    word_intro: 'New Word',
    char_intro: 'New Character',

  };

  let html = `<div class="exercise-type-badge">${typeLabels[type] || type}</div>`;

  switch (type) {
    case 'vocab_quiz':
      html += renderVocabQuiz(ex);
      break;
    case 'grammar_fill':
      html += renderGrammarFill(ex);
      break;
    case 'sentence_build':
      html += renderSentenceBuild(ex);
      break;
    case 'reading':
      html += renderReading(ex);
      break;
    case 'listening':
      html += renderListening(ex);
      break;
    case 'pronunciation':
      html += renderPronunciation(ex);
      break;
    case 'scene_intro':
      html += renderSceneIntro(ex);
      break;
    case 'word_intro':
      html += renderWordIntro(ex);
      break;
    case 'vocab_recall':
      html += renderVocabRecall(ex);
      break;
    case 'particle_recall':
      html += renderParticleRecall(ex);
      break;
    case 'reading_recall':
      html += renderReadingRecall(ex);
      break;
    case 'char_intro':
      html += renderCharIntro(ex);
      break;
    case 'hiragana_intro':
      html += renderHiraganaIntro(ex);
      break;
    case 'hiragana_read':
      html += renderHiraganaRead(ex);
      break;
    case 'hiragana_spot':
      html += renderHiraganaSpot(ex);
      break;
    case 'hiragana_reverse':
      html += renderHiraganaReverse(ex);
      break;
    case 'hiragana_listen':
      html += renderHiraganaListen(ex);
      break;
    case 'hiragana_confusable':
      html += renderHiraganaConfusable(ex);
      break;
    case 'hiragana_build':
      html += renderHiraganaBuild(ex);
      break;
    case 'hiragana_produce':
      html += renderHiraganaProduce(ex);
      break;
    case 'hiragana_vocab':
      html += renderHiraganaVocab(ex);
      break;
    case 'anchor_intro':
      html += renderAnchorIntro(ex);
      break;
    case 'anchor_context':
      html += renderAnchorContext(ex);
      break;
    case 'anchor_read':
      html += renderAnchorRead(ex);
      break;
    case 'anchor_produce':
      html += renderAnchorProduce(ex);
      break;
    default:
      html += `<p>Unknown exercise type: ${type}</p>`;
  }

  exerciseCard.innerHTML = html;

  // Post-render setup
  if (type === 'scene_intro' || type === 'word_intro') {
    setupSceneIntro(ex);
  } else if (type === 'char_intro') {
    setupCharIntro(ex);
  } else if (type === 'hiragana_intro') {
    setupHiraganaIntro(ex);
  } else if (type === 'hiragana_read') {
    setupHiraganaRead(ex);
  } else if (type === 'hiragana_listen') {
    setupHiraganaListen(ex);
  } else if (type === 'hiragana_build') {
    setupHiraganaBuild(ex);
  } else if (type === 'sentence_build') {
    setupSentenceBuild(ex);
  } else if (type === 'listening') {
    // Auto-play audio after short delay
    setTimeout(() => speakJapanese(ex.japanese || ex.question), 400);
  } else if (type === 'pronunciation') {
    setupPronunciation(ex);
  } else if (type === 'vocab_recall' || type === 'particle_recall' || type === 'reading_recall') {
    setupProductionExercise(ex);
  } else if (type === 'hiragana_produce') {
    setupHiraganaProduce(ex);
  } else if (type === 'anchor_intro') {
    setupAnchorIntro(ex);
  } else if (type === 'anchor_context' || type === 'anchor_read' || type === 'anchor_produce') {
    setupAnchorExercise(ex);
  }
}

// ── Scene Intro (new phrase) ───────────────────────
function renderSceneIntro(ex) {
  return `
    <div class="exercise-prompt" style="text-align:center;">
      <p class="japanese-text" style="font-size:2rem; margin-bottom:0.5rem;">${escHtml(ex.japanese)}</p>
      <p style="font-size:0.85rem; color:var(--color-text-muted); margin-bottom:0.25rem;">${escHtml(ex.romaji || '')}</p>
      <p style="font-size:1rem; color:var(--color-text-secondary);">${escHtml(ex.english)}</p>
      <button class="btn-play-audio" id="btn-replay-intro" style="font-size:1.5rem; background:none; border:1px solid var(--color-border); padding:0.5rem 1.25rem; cursor:pointer; margin-top:1rem;">&#9654;</button>
    </div>
    <div id="explanation-slot"></div>
  `;
}

function renderWordIntro(ex) {
  const breakdownHtml = ex.breakdown
    ? ex.breakdown.map(b => `${b.char} (${b.romaji})`).join(' + ')
    : '';
  return `
    <div class="exercise-prompt" style="text-align:center;">
      <p class="japanese-text" style="font-size:2rem; margin-bottom:0.5rem;">${escHtml(ex.japanese)}</p>
      <p style="font-size:0.85rem; color:var(--color-text-muted); margin-bottom:0.25rem;">${escHtml(ex.romaji || '')}</p>

// ── Anchor Exercise Setup (shared) ─────────────────
function setupAnchorExercise(ex) {
  const input = exerciseCard.querySelector('#anchor-input');
  const checkBtn = exerciseCard.querySelector('#anchor-check');
  if (!input || !checkBtn) return;

  const startTime = Date.now();
  setTimeout(() => input.focus(), 300);

  function checkAnswer() {
    if (answered) return;
    const userAnswer = input.value.trim();
    if (!userAnswer) return;

    let isCorrect = false;
    const responseTime = Date.now() - startTime;

    if (ex.type === 'anchor_read') {
      // Kana → romaji: compare romaji
      const normInput = normalizeRomaji(userAnswer.toLowerCase());
      const normCorrect = normalizeRomaji(ex.correct_romaji);
      isCorrect = normInput === normCorrect;
    } else {
      // anchor_context, anchor_produce: accept kana or romaji
      if (ex.accepts) {
        const normInput = userAnswer.toLowerCase().replace(/[？！?!。、\s]/g, '');
        isCorrect = ex.accepts.some(a => {
          const normA = a.toLowerCase().replace(/[？！?!。、\s]/g, '');
          return normInput === normA;
        });
      }
      if (!isCorrect) {
        isCorrect = matchesAnswer(userAnswer, ex.correct_kana, ex.correct_romaji);
      }
    }

    answered = true;
    input.disabled = true;
    checkBtn.disabled = true;

    const isFast = isCorrect && responseTime < 2000;
    if (isCorrect) {
      input.classList.add(isFast ? 'input-correct-fast' : 'input-correct');
    } else {
      input.classList.add('input-incorrect');
      setTimeout(() => input.classList.add('input-incorrect-fade'), 150);
    }

    // FSRS update
    const rating = exerciseToRating(isCorrect, responseTime);
    if (ex._anchorKey) {
      ensureHiraFSRSCard(ex._anchorKey);
      updateFSRSCard(ex._anchorKey, rating);
    }

    sessionResults.push({ type: ex.type, correct: isCorrect });
    recordExerciseResult(ex.type, isCorrect);

    if (!isCorrect) {
      reinforceQueue.push(ex);
    }

    // Build explanation from anchor word data
    // Look up the full anchor word for context
    const anchorId = ex._anchorKey ? ex._anchorKey.replace('anchor_', '') : null;
    const anchorWord = anchorId ? anchorWords.find(w => w.id === anchorId) : null;
    const kana = ex.correct_display || ex.correct_kana || (anchorWord ? anchorWord.japanese : '');
    const romaji = ex.correct_romaji || (anchorWord ? anchorWord.romaji : '');
    const english = ex.english || (anchorWord ? anchorWord.english : '');
    const context = ex.context || (anchorWord ? anchorWord.context : '');

    let explanation;
    if (ex.type === 'anchor_read') {
      explanation = `${kana} (${romaji}) = "${english}". Use when: ${context}`;
    } else {
      explanation = `${kana} (${romaji}) = "${english}". Use when: ${context}`;
    }

    // Reveal correct answer on wrong
    let revealHtml = '';
    if (!isCorrect) {
      if (ex.type === 'anchor_read') {
        revealHtml = `<div class="correct-answer-reveal">
          <p class="answer-label">correct answer</p>
          <p class="answer-text" style="font-family:var(--font-en);">${escHtml(romaji)}</p>
        </div>`;
      } else {
        revealHtml = `<div class="correct-answer-reveal">
          <p class="answer-label">correct answer</p>
          <p class="answer-text">${escHtml(kana)}</p>
          <p style="font-size:0.85rem; color:var(--color-text-muted); margin-top:0.25rem;">${escHtml(romaji)}</p>
        </div>`;
      }
    }

    const slot = exerciseCard.querySelector('#explanation-slot');
    if (slot) slot.innerHTML = revealHtml;

    // Build exercise object for showExplanation (review log + inline explanation)
    const explEx = {
      japanese: kana,
      romaji: romaji,
    };
    const correctAnswer = isCorrect ? null : (ex.type === 'anchor_read' ? romaji : kana);
    showExplanation(isCorrect, explanation, correctAnswer, explEx);
    showNextButton(isCorrect, isFast);
  }

  checkBtn.addEventListener('click', checkAnswer);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkAnswer();
  });
}

function setupHiraganaBuild(ex) {
  const chips = exerciseCard.querySelectorAll('.word-chip');
  const answerZone = exerciseCard.querySelector('#answer-zone');
  const btnCheck = exerciseCard.querySelector('#btn-check-build');
  const selectedChars = [];

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      if (answered) return;
      const char = chip.dataset.word;
      const idx = parseInt(chip.dataset.index, 10);

      if (chip.classList.contains('used')) {
        chip.classList.remove('used');
        const inAnswer = answerZone.querySelector(`[data-source-index="${idx}"]`);
        if (inAnswer) inAnswer.remove();
        const pos = selectedChars.findIndex(c => c.idx === idx);
        if (pos > -1) selectedChars.splice(pos, 1);
      } else {
        chip.classList.add('used');
        selectedChars.push({ char, idx });
        const answerChip = document.createElement('span');
        answerChip.className = 'word-chip in-answer jp';
        answerChip.style.fontSize = '1.5rem';
        answerChip.textContent = char;
        answerChip.dataset.sourceIndex = idx;
        answerChip.addEventListener('click', () => {
          if (answered) return;
          answerChip.remove();
          chip.classList.remove('used');
          const pos = selectedChars.findIndex(c => c.idx === idx);
          if (pos > -1) selectedChars.splice(pos, 1);
          btnCheck.disabled = selectedChars.length === 0;
        });
        answerZone.appendChild(answerChip);
      }
      btnCheck.disabled = selectedChars.length === 0;
    });
  });

  btnCheck.addEventListener('click', () => {
    if (answered) return;
    answered = true;
    btnCheck.disabled = true;
    btnCheck.classList.add('hidden');

    const userAnswer = selectedChars.map(c => c.char).join('');
    const isCorrect = userAnswer === ex.correct_answer;

    sessionResults.push({ type: ex.type, correct: isCorrect });
    recordExerciseResult(ex.type, isCorrect);

    if (!isCorrect) reinforceQueue.push(ex);

    // Visual feedback on answer zone
    answerZone.style.borderColor = isCorrect ? 'var(--color-text)' : 'var(--color-vermillion)';

    let breakdownHtml = ex.breakdown.map(b => `${b.char}(${b.romaji})`).join(' + ');
    showExplanation(isCorrect, breakdownHtml + ` = ${ex.romaji} = "${ex.english}"`, isCorrect ? null : ex.correct_answer, ex);
    showNextButton(isCorrect);
  });
}

function setupSentenceBuild(ex) {
  const chips = exerciseCard.querySelectorAll('.word-chip');
  const answerZone = exerciseCard.querySelector('#answer-zone');
  const btnCheck = exerciseCard.querySelector('#btn-check-build');
  const selectedWords = [];

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      if (answered) return;
      const word = chip.dataset.word;
      const idx = parseInt(chip.dataset.index, 10);

      if (chip.classList.contains('used')) {
        // Remove from answer
        chip.classList.remove('used');
        const inAnswer = answerZone.querySelector(`[data-source-index="${idx}"]`);
        if (inAnswer) inAnswer.remove();
        const pos = selectedWords.indexOf(word);
        if (pos > -1) selectedWords.splice(pos, 1);
      } else {
        // Add to answer
        chip.classList.add('used');
        selectedWords.push(word);
        const answerChip = document.createElement('span');
        answerChip.className = 'word-chip in-answer';
        answerChip.textContent = word;
        answerChip.dataset.sourceIndex = idx;
        answerChip.addEventListener('click', () => {
          if (answered) return;
          answerChip.remove();
          chip.classList.remove('used');
          const pos = selectedWords.indexOf(word);
          if (pos > -1) selectedWords.splice(pos, 1);
          btnCheck.disabled = selectedWords.length === 0;
        });
        answerZone.appendChild(answerChip);
      }

      btnCheck.disabled = selectedWords.length === 0;
    });
  });

  btnCheck.addEventListener('click', () => {
    if (answered) return;
    answered = true;
    btnCheck.disabled = true;
    btnCheck.classList.add('hidden');

    const userAnswer = selectedWords.join('');
    const correctAnswer = ex.correct_answer;
    const isCorrect = userAnswer === correctAnswer;

    // Record result
    sessionResults.push({ type: ex.type, correct: isCorrect });
    recordExerciseResult(ex.type, isCorrect, ex._vocabIndex, ex._grammarIndex);

    // Queue reinforcement for wrong answers
    if (!isCorrect) {
      reinforceQueue.push(ex);
    }

    if (isCorrect) {
      answerZone.classList.add('correct-zone');
    } else {
      answerZone.classList.add('incorrect-zone');
    }

    showExplanation(isCorrect, ex.explanation, isCorrect ? null : correctAnswer, ex);
    showNextButton(isCorrect);
  });
}

function setupPronunciation(ex) {
  const btnRecord = exerciseCard.querySelector('#btn-record-audio');
  const indicator = exerciseCard.querySelector('#recording-indicator');
  const resultBox = exerciseCard.querySelector('#pronunciation-result');
  const recordIcon = exerciseCard.querySelector('#record-icon');
  const stopIcon = exerciseCard.querySelector('#stop-icon');
  const recordLabel = exerciseCard.querySelector('#record-label');
  const expected = ex.japanese || ex.question;
  const expectedAlt = ex.correct_answer || null;  // kana reading
  const expectedRomaji = ex.romaji || null;        // romaji reading
  let pendingTranscript = null;

  const useMobileWhisper = isMobile;

  if (!SpeechRecognitionAPI && !useMobileWhisper) {
    btnRecord.disabled = true;
    resultBox.classList.remove('hidden');
    exerciseCard.querySelector('#pron-detected').textContent = 'Speech recognition not supported in this browser.';
    return;
  }

  function setButtonState(state) {
    if (state === 'record') {
      recordIcon.classList.remove('hidden');
      stopIcon.classList.add('hidden');
      recordLabel.textContent = 'Record';
      btnRecord.classList.remove('recording');
      indicator.classList.add('hidden');
    } else if (state === 'stop') {
      recordIcon.classList.add('hidden');
      stopIcon.classList.remove('hidden');
      recordLabel.textContent = 'Stop';
      btnRecord.classList.add('recording');
      indicator.classList.remove('hidden');
    }
  }

  function processResult(transcript) {
    resultBox.classList.remove('hidden');
    exerciseCard.querySelector('#pron-detected').textContent = transcript;

    // Compare against all representations, take best score
    let similarity = computeSimilarity(expected, transcript);
    if (expectedAlt) similarity = Math.max(similarity, computeSimilarity(expectedAlt, transcript));
    if (expectedRomaji) similarity = Math.max(similarity, computeSimilarity(expectedRomaji, transcript));
    const matchEl = exerciseCard.querySelector('#pron-match');
    const detectedEl = exerciseCard.querySelector('#pron-detected');
    const hearBtn = exerciseCard.querySelector('#btn-hear-correct');

    if (similarity >= 0.6) {
      matchEl.textContent = 'Excellent!';
      matchEl.className = 'match-good';
      detectedEl.className = 'detected-text match-good';
      // Good match — lock answer and auto-advance
      answered = true;
      sessionResults.push({ type: ex.type, correct: true });
      recordExerciseResult(ex.type, true, ex._vocabIndex, ex._grammarIndex);
      if (hearBtn) hearBtn.classList.add('hidden');
      showNextButton(true);
    } else if (similarity >= 0.3) {
      matchEl.textContent = 'Close — try again or skip';
      matchEl.className = 'match-partial';
      detectedEl.className = 'detected-text match-partial';
      // Partial — allow retry, show hear button
      if (hearBtn) hearBtn.classList.remove('hidden');
    } else {
      matchEl.textContent = 'Try again';
      matchEl.className = 'match-poor';
      detectedEl.className = 'detected-text match-poor';
      // Poor — allow retry, show hear button
      if (hearBtn) hearBtn.classList.remove('hidden');
    }
  }

  // Mobile: MediaRecorder + Whisper for pronunciation
  let pronRecorder = null;
  let pronStream = null;

  btnRecord.addEventListener('click', async () => {
    if (answered) return;

    if (useMobileWhisper) {
      // ── Mobile: Whisper path ──
      if (isRecording && pronRecorder && pronRecorder.state === 'recording') {
        pronRecorder.stop();
        return;
      }

      try {
        pronStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        resultBox.classList.remove('hidden');
        exerciseCard.querySelector('#pron-detected').textContent = 'Microphone access denied. Please allow mic permissions.';
        return;
      }

      const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
        : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
      pronRecorder = new MediaRecorder(pronStream, mimeType ? { mimeType } : {});
      const chunks = [];

      isRecording = true;
      setButtonState('stop');
      pendingTranscript = null;

      pronRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

      pronRecorder.onstop = async () => {
        if (pronStream) { pronStream.getTracks().forEach(t => t.stop()); pronStream = null; }
        isRecording = false;
        setButtonState('record');
        pronRecorder = null;

        const blob = new Blob(chunks, { type: mimeType || 'audio/mp4' });
        if (blob.size < 100) return;

        // Show transcribing state
        resultBox.classList.remove('hidden');
        exerciseCard.querySelector('#pron-detected').textContent = '...';

        try {
          const res = await fetch(AI_TRANSCRIBE_URL, {
            method: 'POST',
            headers: { 'Content-Type': mimeType || 'audio/mp4' },
            body: blob,
          });
          if (!res.ok) throw new Error('Whisper ' + res.status);
          const data = await res.json();
          const text = (data.text || '').trim();
          if (text && !answered) processResult(text);
          else {
            exerciseCard.querySelector('#pron-detected').textContent = 'No speech detected. Try again.';
          }
        } catch (e) {
          console.warn('Whisper failed:', e);
          exerciseCard.querySelector('#pron-detected').textContent = 'Transcription failed. Try again.';
        }
      };

      pronRecorder.onerror = () => {
        if (pronStream) { pronStream.getTracks().forEach(t => t.stop()); pronStream = null; }
        isRecording = false;
        setButtonState('record');
        pronRecorder = null;
      };

      pronRecorder.start();
    } else {
      // ── Desktop: Web Speech API path ──
      if (isRecording && recognition) {
        recognition.stop();
        return;
      }

      pendingTranscript = null;
      recognition = new SpeechRecognitionAPI();
      recognition.lang = 'ja-JP';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = true;

      recognition.onstart = () => {
        isRecording = true;
        setButtonState('stop');
      };

      recognition.onresult = (event) => {
        const last = event.results[event.results.length - 1];
        pendingTranscript = last[0].transcript;
      };

      recognition.onerror = (event) => {
        isRecording = false;
        setButtonState('record');
        resultBox.classList.remove('hidden');
        const detectedEl = exerciseCard.querySelector('#pron-detected');
        if (event.error === 'not-allowed') {
          detectedEl.textContent = 'Microphone access denied. Please allow mic permissions.';
        } else if (event.error !== 'aborted') {
          detectedEl.textContent = `Error: ${event.error}. Tap Record to try again.`;
        }
      };

      recognition.onend = () => {
        isRecording = false;
        setButtonState('record');
        if (pendingTranscript && !answered) {
          processResult(pendingTranscript);
        }
      };

      recognition.start();
    }
  });

  // "Hear correct pronunciation" button — TTS playback of the expected text
  const hearBtn = exerciseCard.querySelector('#btn-hear-correct');
  if (hearBtn) {
    hearBtn.addEventListener('click', () => {
      speakJapanese(expected);
    });
  }
}

function computeSimilarity(a, b) {
  // Normalize: remove spaces, punctuation
  const normalize = (s) => s.replace(/[\s、。！？!?\.,\s]/g, '');
  const na = normalize(a);
  const nb = normalize(b);

  if (na === nb) return 1;
  if (na.length === 0 || nb.length === 0) return 0;

  // Levenshtein-based similarity
  const len = Math.max(na.length, nb.length);
  const dist = levenshtein(na, nb);
  return 1 - (dist / len);
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1]
        ? dp[i - 1][j - 1]
        : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
}

// ── TTS ─────────────────────────────────────────────
function initVoices() {
  voices = speechSynthesis.getVoices();
  const jaVoices = voices.filter(v => v.lang.startsWith('ja'));
  if (jaVoices.length > 0) {
    jaVoice = jaVoices[0];
  }
}

if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = initVoices;
  initVoices();
}

function speakJapanese(text) {
  if (typeof speechSynthesis === 'undefined') return;
  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  if (jaVoice) utter.voice = jaVoice;

  const playBtn = exerciseCard.querySelector('#btn-play-audio');
  const replayBtn = exerciseCard.querySelector('#btn-replay');

  if (playBtn) {
    utter.onstart = () => playBtn.classList.add('speaking');
    utter.onend = () => {
      playBtn.classList.remove('speaking');
      if (replayBtn) replayBtn.classList.remove('hidden');
    };
    utter.onerror = () => {
      playBtn.classList.remove('speaking');
      if (replayBtn) replayBtn.classList.remove('hidden');
    };
  }

  speechSynthesis.speak(utter);
}

function setupProductionExercise(ex) {
  const input = exerciseCard.querySelector('#production-input');
  const checkBtn = exerciseCard.querySelector('#production-check');
  if (!input || !checkBtn) return;

  const startTime = Date.now();
  setTimeout(() => input.focus(), 300);

  function checkAnswer() {
    if (answered) return;
    const userAnswer = input.value.trim();
    if (!userAnswer) return;

    let isCorrect = false;
    const responseTime = Date.now() - startTime;

    if (ex.type === 'vocab_recall') {
      isCorrect = matchesAnswer(userAnswer, ex.correct_kana, ex.correct_romaji);
    } else if (ex.type === 'particle_recall') {
      // Accept kana or romaji for particles
      isCorrect = matchesAnswer(userAnswer, ex.correct_answer, null) ||
                  normalizeRomaji(userAnswer.toLowerCase()) === normalizeRomaji(ex.correct_answer);
    } else if (ex.type === 'reading_recall') {
      // Fuzzy English match: lowercase, trim, ignore punctuation
      const normUser = userAnswer.toLowerCase().replace(/[^\w\s]/g, '').trim();
      const normCorrect = ex.correct_answer.toLowerCase().replace(/[^\w\s]/g, '').trim();
      // Exact match or close enough (contains the key words)
      isCorrect = normUser === normCorrect;
      if (!isCorrect) {
        // Check if all significant words are present
        const correctWords = normCorrect.split(/\s+/).filter(w => w.length > 2);
        const userWords = normUser.split(/\s+/);
        const matchCount = correctWords.filter(w => userWords.some(uw => uw.includes(w) || w.includes(uw))).length;
        isCorrect = correctWords.length > 0 && matchCount >= correctWords.length * 0.7;
      }
    }

    answered = true;
    input.disabled = true;
    checkBtn.disabled = true;

    // Quality-differentiated feedback
    const isFast = isCorrect && responseTime < 2000;
    if (isCorrect) {
      input.classList.add(isFast ? 'input-correct-fast' : 'input-correct');
    } else {
      input.classList.add('input-incorrect');
      // Fade the wrong answer — you see what you typed, but dimmed
      setTimeout(() => input.classList.add('input-incorrect-fade'), 150);
    }

    // FSRS rating
    const rating = exerciseToRating(isCorrect, responseTime);
    const fsrsKey = ex._sceneKey
      ? ex._sceneKey
      : ex._vocabIndex
        ? `vocab_${ex._vocabIndex}`
        : ex._grammarIndex
          ? `grammar_${ex._grammarIndex}`
          : null;
    if (fsrsKey) {
      updateFSRSCard(fsrsKey, rating);
    }
    // Track individual kana characters in FSRS
    if (ex._hiraChars && ex._hiraChars.length) {
      const prefix = ex._isKatakana ? 'kata_' : 'hira_';
      for (const ch of ex._hiraChars) {
        const hKey = `${prefix}${ch}`;
        ensureHiraFSRSCard(hKey);
        updateFSRSCard(hKey, rating);
      }
    }

    sessionResults.push({ type: ex.type, correct: isCorrect });
    recordExerciseResult(ex.type, isCorrect, ex._vocabIndex, ex._grammarIndex);

    if (!isCorrect) {
      reinforceQueue.push(ex);
    }

    // Show correct answer for production exercises
    let revealHtml = '';
    if (!isCorrect) {
      if (ex.type === 'vocab_recall') {
        const detailLine = ex.correct_romaji
          ? `<p style="font-size:0.85rem; color:var(--color-text-muted); margin-top:0.25rem;">${escHtml(ex.correct_kana)} (${escHtml(ex.correct_romaji)})</p>`
          : '';
        revealHtml = `<div class="correct-answer-reveal">
          <p class="answer-label">correct answer</p>
          <p class="answer-text">${escHtml(ex.correct_display || ex.correct_kana)}</p>
          ${detailLine}
        </div>`;
      } else if (ex.type === 'particle_recall') {
        revealHtml = `<div class="correct-answer-reveal">
          <p class="answer-label">correct answer</p>
          <p class="answer-text">${escHtml(ex.correct_answer)}</p>
        </div>`;
      } else if (ex.type === 'reading_recall') {
        revealHtml = `<div class="correct-answer-reveal">
          <p class="answer-label">correct answer</p>
          <p class="answer-text" style="font-family:var(--font-en); font-size:1.1rem;">${escHtml(ex.correct_answer)}</p>
        </div>`;
      }
    }

    const slot = exerciseCard.querySelector('#explanation-slot');
    if (slot) {
      slot.innerHTML = revealHtml;
    }

    showExplanation(isCorrect, ex.explanation, null, ex);
    showNextButton(isCorrect, isFast);
  }

  checkBtn.addEventListener('click', checkAnswer);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkAnswer();
  });
}

// ── Shared Option Handler ───────────────────────────
window.__selectOption = function(btn) {
  if (answered) return;
  answered = true;

  const optionsGrid = btn.closest('.options-grid');
  const correctAnswer = optionsGrid ? optionsGrid.dataset.correct : '';
  const userAnswer = btn.dataset.answer;
  const isCorrect = userAnswer === correctAnswer;
  const ex = exercises[currentIndex];

  // Highlight selected button
  btn.classList.add(isCorrect ? 'correct' : 'incorrect');

  // Disable all option buttons
  const allBtns = exerciseCard.querySelectorAll('.btn-option');
  allBtns.forEach(b => { b.disabled = true; });

  if (isCorrect) {
    // Correct: fade others immediately
    if (optionsGrid) optionsGrid.classList.add('answered');
  } else {
    // Wrong: 200ms pause before revealing correct — let the error register first
    if (optionsGrid) optionsGrid.classList.add('answered');
    setTimeout(() => {
      allBtns.forEach(b => {
        if (b.dataset.answer === correctAnswer) {
          b.classList.add('reveal-correct');
        }
      });
    }, 200);
  }

  // Record result
  sessionResults.push({ type: ex.type, correct: isCorrect });
  recordExerciseResult(ex.type, isCorrect, ex._vocabIndex, ex._grammarIndex);

  // Queue reinforcement for wrong answers
  if (!isCorrect) {
    reinforceQueue.push(ex);
  }

  // Reveal listening romaji after answering
  const listeningRomajiSlot = exerciseCard.querySelector('#listening-romaji-slot');
  if (listeningRomajiSlot) {
    listeningRomajiSlot.classList.remove('hidden');
  }

  showExplanation(isCorrect, ex.explanation, isCorrect ? null : correctAnswer, ex);
  showNextButton(isCorrect);
};

// ── Explanation ─────────────────────────────────────
function showExplanation(isCorrect, explanation, correctAnswer, exercise) {
  const ex = exercise || {};
  const romaji = ex.romaji || null;
  const japanese = ex.japanese || ex.question || ex.passage || '';

  // Avoid duplicate romaji if explanation already contains it
  const explanationHasRomaji = explanation && romaji && explanation.includes(romaji);

  let html = `<div class="explanation-box">`;
  html += `<strong style="color:${isCorrect ? 'var(--color-correct)' : 'var(--color-incorrect)'}">`;
  html += isCorrect ? 'Correct!' : 'Incorrect';
  html += `</strong>`;
  if (japanese && romaji && !explanationHasRomaji) {
    html += `<br><span class="jp">${escHtml(japanese)}</span> <span style="color:var(--color-text-muted);">(${escHtml(romaji)})</span>`;
  }
  if (!isCorrect && correctAnswer) {
    html += `<br>The answer is: <strong class="jp">${escHtml(correctAnswer)}</strong>`;
  }
  if (explanation) {
    html += `<br>${escHtml(explanation)}`;
  }
  html += `</div>`;

  // Prepend to review log (most recent on top)
  const log = document.getElementById('session-review-log');
  if (log) {
    const entry = document.createElement('div');
    entry.innerHTML = html;
    if (log.children.length > 0) {
      const divider = document.createElement('hr');
      divider.style.cssText = 'border:none;border-top:1px solid var(--color-border-light);margin:0.5rem 0;opacity:0.5;';
      entry.appendChild(divider);
      log.insertBefore(entry, log.firstChild);
    } else {
      log.appendChild(entry);
    }
  }
}

let correctStreak = 0;

function showNextButton(autoAdvance, wasFast) {
  if (autoAdvance) {
    correctStreak++;
    // Faster auto-advance when on a streak or answered fast
    const baseDelay = wasFast ? 700 : 1200;
    const streakReduction = correctStreak >= 5 ? 300 : correctStreak >= 3 ? 150 : 0;
    const delay = Math.max(500, baseDelay - streakReduction);

    // Pulse progress bar on fast correct
    if (wasFast) {
      progressFill.classList.add('pulse');
      setTimeout(() => progressFill.classList.remove('pulse'), 300);
    }

    btnAction.disabled = true;
    setTimeout(() => {
      if (answered) goToNextExercise();
    }, delay);
  } else {
    correctStreak = 0;
    // Wrong answer: mandatory absorption time before Next is available
    btnAction.disabled = true;
    setTimeout(() => {
      btnAction.textContent = 'Next';
      btnAction.classList.remove('btn-skip-state');
      btnAction.classList.add('btn-next-state');
      btnAction.disabled = false;
    }, 1500);
  }
}

// ── Navigation ──────────────────────────────────────
function goToNextExercise() {
  currentIndex++;

  // Every 2 exercises, inject a reinforcement if queued
  if (reinforceQueue.length > 0 && currentIndex % 2 === 0 && currentIndex < exercises.length) {
    const wrongEx = reinforceQueue.shift();
    let reinforcement = null;

    if (currentMode === 'learn' || currentMode === 'learn-katakana') {
      reinforcement = makeLearningReinforcement(wrongEx);
    } else if (currentMode === 'anchor') {
      // Re-insert the same exercise for anchor words
      reinforcement = { ...wrongEx };
    } else {
      const history = loadSkillHistory();
      const currentLessonIdx = history.currentLesson || 0;
      const lessons = n5Content.lessons;
      const lessonVocab = getVocabUpToLesson(lessons, currentLessonIdx).filter(v => v._lessonIdx === currentLessonIdx);
      const lessonSentences = getSentencesUpToLesson(lessons, currentLessonIdx).filter(s => s._lessonIdx === currentLessonIdx);
      reinforcement = makeReinforcement(wrongEx, lessonVocab, lessonSentences);
    }

    if (reinforcement) {
      reinforcement._isReinforcement = true;
      exercises.splice(currentIndex, 0, reinforcement);
    }
  }

  if (currentIndex >= exercises.length) {
    finishSession();
  } else {
    renderExercise();
  }
}

function skipExercise() {
  const ex = exercises[currentIndex];
  sessionResults.push({ type: ex.type, correct: false });
  recordExerciseResult(ex.type, false, ex._vocabIndex, ex._grammarIndex);
  currentIndex++;
  if (currentIndex >= exercises.length) {
    finishSession();
  } else {
    renderExercise();
  }
}

// ── Session Complete ────────────────────────────────
function finishSession() {
  // Cancel any ongoing speech
  if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();
  if (isRecording && recognition) {
    recognition.stop();
    isRecording = false;
  }

  updateStatsAfterSession();

  // Kana mode: auto-advance when group is learned, set Continue button
  if (currentMode === 'learn' || currentMode === 'learn-katakana') {
    const isKatakana = currentMode === 'learn-katakana';
    const groups = isKatakana ? katakanaGroups : hiraganaGroups;
    const prefix = isKatakana ? 'kata_' : 'hira_';
    const history = loadSkillHistory();
    const key = isKatakana ? 'currentKatakanaGroup' : 'currentGroup';
    const current = history[key] || 0;
    const fsrsState = loadFSRSState();

    if (isGroupLearned(groups[current], fsrsState, prefix) && current < groups.length - 1) {
      history[key] = current + 1;
      saveSkillHistory(history);
      kanaContinueSession = false; // next session gets intro for new group
      btnPracticeAgain.textContent = `Next: ${groups[current + 1].name}`;
    } else {
      kanaContinueSession = true;
      btnPracticeAgain.textContent = 'Continue';
    }
  } else {
    kanaContinueSession = false;
    btnPracticeAgain.textContent = 'Practice Again';
  }

  // Compute score
  const total = sessionResults.length;
  const correct = sessionResults.filter(r => r.correct).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

  // Animated count-up for score
  const scoreEl = $('#score-num');
  const denomEl = $('#score-denom');
  const pctEl = $('#score-percent');
  denomEl.textContent = `/ ${total}`;
  scoreEl.textContent = '0';
  pctEl.textContent = '';

  // Count up from 0 to correct over 600ms
  const countDuration = 600;
  const countStart = performance.now();
  function countUp(now) {
    const elapsed = now - countStart;
    const progress = Math.min(elapsed / countDuration, 1);
    const current = Math.round(progress * correct);
    scoreEl.textContent = current;
    if (progress < 1) {
      requestAnimationFrame(countUp);
    } else {
      scoreEl.textContent = correct;
      // Show percentage after count settles
      setTimeout(() => { pctEl.textContent = `${pct}%`; }, 200);
    }
  }
  requestAnimationFrame(countUp);

  // Message — honest, not patronizing
  const msgEl = $('#complete-message');
  if (pct >= 90) {
    msgEl.textContent = '';
  } else if (pct >= 70) {
    msgEl.textContent = 'Good session.';
  } else if (pct >= 50) {
    msgEl.textContent = 'Keep going.';
  } else {
    msgEl.textContent = '';
  }

  // Breakdown by type
  const byType = {};
  for (const r of sessionResults) {
    if (!byType[r.type]) byType[r.type] = { correct: 0, total: 0 };
    byType[r.type].total++;
    if (r.correct) byType[r.type].correct++;
  }

  const typeLabels = {
    vocab_quiz: 'Vocabulary',
    grammar_fill: 'Grammar',
    sentence_build: 'Sentence Building',
    reading: 'Reading',
    listening: 'Listening',
    pronunciation: 'Pronunciation',
    vocab_recall: 'Recall',
    particle_recall: 'Particle Recall',
    reading_recall: 'Translation',
    hiragana_read: 'Read It',
    hiragana_spot: 'Spot It',
    hiragana_reverse: 'Read & Choose',
    hiragana_listen: 'Listen & Type',
    hiragana_confusable: 'Look-Alikes',
    hiragana_build: 'Build the Word',
    hiragana_produce: 'Type Kana',
    hiragana_vocab: 'Read Real Words',
    scene_intro: 'New Phrase',
    word_intro: 'New Word',
    char_intro: 'New Character',
    anchor_intro: 'New Anchor Word',
    anchor_context: 'React',
    anchor_read: 'Read It',
    anchor_produce: 'Type It',
  };

  const breakdownList = $('#breakdown-list');
  breakdownList.innerHTML = '';

  for (const [type, data] of Object.entries(byType)) {
    const rate = data.total > 0 ? data.correct / data.total : 0;
    const ratePct = Math.round(rate * 100);
    let barClass = 'good';
    if (rate < 0.5) barClass = 'poor';
    else if (rate < 0.8) barClass = 'ok';

    const li = document.createElement('li');
    li.className = 'breakdown-item';
    const idx = breakdownList.children.length;
    li.style.animationDelay = `${400 + idx * 100}ms`;
    li.innerHTML = `
      <span class="breakdown-type">${typeLabels[type] || type}</span>
      <div class="breakdown-bar">
        <div class="breakdown-bar-fill ${barClass}" style="width:0%"></div>
      </div>
      <span class="breakdown-score">${data.correct}/${data.total}</span>
    `;
    breakdownList.appendChild(li);
    // Animate bar width after stagger delay
    setTimeout(() => {
      const bar = li.querySelector('.breakdown-bar-fill');
      if (bar) bar.style.width = `${ratePct}%`;
    }, 500 + idx * 100);
  }

  // Update progress bar to 100%
  progressFill.style.width = '100%';

  // Show "enter scene" button when drill came from scene (or any action mode drill)
  const enterSceneBtn = document.getElementById('btn-enter-scene-after-drill');
  if (currentMode === 'action') {
    enterSceneBtn.classList.remove('hidden');
  } else {
    enterSceneBtn.classList.add('hidden');
  }

  showView('view-complete');
}

function escAttr(str) {

// ══════════════════════════════════════════════════════
const AI_EVALUATE_URL = 'https://renshu-iota.vercel.app/api/evaluate';
const AI_TIMEOUT_MS = 4000;

async function evaluateWithAI(exchange, scenario, userInput, normalized) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), AI_TIMEOUT_MS);
  try {
    const res = await fetch(AI_EVALUATE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        line: exchange.line,
        lineEn: exchange.lineEn,
        prompt: exchange.prompt,
        register: scenario.register,
        best: exchange.best,
        accepts: exchange.accepts,
        userInput,
        normalized,
        closeFeedback: exchange.feedback.close || [],
      }),
    });
    clearTimeout(timeout);
    if (!res.ok) return null;
    return await res.json();
  } catch (e) {
    clearTimeout(timeout);
    return null;
  }
}
