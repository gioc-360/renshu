// Voice I/O
// ══════════════════════════════════════════════════════
const AI_TTS_URL = 'https://renshu-iota.vercel.app/api/tts';
const TTS_VOICE = 'fable';
let ttsAudioElement = null;

async function playYukiLine(text) {
  const lineEl = document.getElementById('scene-line');
  lineEl.classList.add('tts-playing');

  try {
    const res = await fetch(AI_TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice: TTS_VOICE }),
    });
    if (!res.ok) throw new Error('TTS API failed');

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    ttsAudioElement = new Audio(url);

    await new Promise((resolve, reject) => {
      ttsAudioElement.onended = resolve;
      ttsAudioElement.onerror = reject;
      ttsAudioElement.play().catch(reject);
    });

    URL.revokeObjectURL(url);
  } catch (e) {
    console.warn('TTS API failed, falling back to browser speech:', e);
    await browserTTSFallback(text);
  } finally {
    // Explicitly release audio element so iOS frees the audio session
    if (ttsAudioElement) {
      ttsAudioElement.pause();
      ttsAudioElement.src = '';
      ttsAudioElement.load();
    }
    lineEl.classList.remove('tts-playing');
    ttsAudioElement = null;
  }
}

function browserTTSFallback(text) {
  return new Promise((resolve) => {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.9;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    speechSynthesis.speak(utterance);
  });
}

let recognitionInstance = null;
let sceneListening = false;
let listenSessionId = 0;

// ── Mobile: MediaRecorder + Whisper ──
let mobileRecorder = null;
let mobileStream = null;
let mobileChunks = [];

function cleanupMobileRecording() {
  if (mobileStream) {
    mobileStream.getTracks().forEach(t => t.stop());
    mobileStream = null;
  }
  mobileRecorder = null;
  mobileChunks = [];
  sceneListening = false;
  const mic = document.getElementById('scene-mic');
  if (mic) mic.classList.remove('mic-listening');
}

async function startMobileRecording() {
  // Clean up any leftover state
  cleanupMobileRecording();

  const mic = document.getElementById('scene-mic');
  const input = document.getElementById('scene-input');

  try {
    mobileStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    console.warn('Mic access denied:', e);
    return;
  }

  const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
    : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
    : '';

  mobileChunks = [];
  const recorder = new MediaRecorder(mobileStream, mimeType ? { mimeType } : {});
  mobileRecorder = recorder;

  recorder.ondataavailable = (e) => {
    if (e.data.size > 0) mobileChunks.push(e.data);
  };

  recorder.start();
  sceneListening = true;
  mic.classList.add('mic-listening');
  input.value = '';
}

async function stopAndTranscribeWhisper() {
  const input = document.getElementById('scene-input');
  const recorder = mobileRecorder;

  if (!recorder || recorder.state !== 'recording') {
    cleanupMobileRecording();
    return null;
  }

  // Collect final data: stop() triggers one last ondataavailable, then onstop
  await new Promise((resolve) => {
    recorder.onstop = resolve;
    recorder.stop();
  });

  // Release mic immediately
  if (mobileStream) {
    mobileStream.getTracks().forEach(t => t.stop());
    mobileStream = null;
  }
  sceneListening = false;
  const mic = document.getElementById('scene-mic');
  if (mic) mic.classList.remove('mic-listening');
  mobileRecorder = null;

  const mimeType = recorder.mimeType || 'audio/mp4';
  const blob = new Blob(mobileChunks, { type: mimeType });
  mobileChunks = [];

  if (blob.size < 100) return null;

  // Send to Whisper
  input.value = '...';
  try {
    const res = await fetch(AI_TRANSCRIBE_URL, {
      method: 'POST',
      headers: { 'Content-Type': mimeType },
      body: blob,
    });
    if (!res.ok) throw new Error('Whisper API ' + res.status);
    const data = await res.json();
    return (data.text || '').trim() || null;
  } catch (e) {
    console.warn('Whisper transcription failed:', e);
    return null;
  }
}

// ── Desktop: Web Speech API ──
function listenWebSpeech() {
  return new Promise((resolve) => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { resolve(null); return; }

    const mic = document.getElementById('scene-mic');
    const input = document.getElementById('scene-input');

    // Toggle off
    if (sceneListening && recognitionInstance) {
      try { recognitionInstance.stop(); } catch (e) {}
      return;
    }

    // Kill any previous instance
    if (recognitionInstance) {
      try { recognitionInstance.stop(); } catch (e) {}
      recognitionInstance.onresult = null;
      recognitionInstance.onerror = null;
      recognitionInstance.onend = null;
      recognitionInstance = null;
    }

    const sessionId = ++listenSessionId;
    const rec = new SpeechRecognition();
    recognitionInstance = rec;
    rec.lang = 'ja-JP';
    rec.interimResults = true;
    rec.maxAlternatives = 3;
    rec.continuous = true;

    sceneListening = true;
    mic.classList.add('mic-listening');

    let finalTranscript = '';
    let lastResultTime = Date.now();

    const safetyTimer = setInterval(() => {
      if (Date.now() - lastResultTime > 8000 && sceneListening) {
        try { rec.stop(); } catch (e) {}
        clearInterval(safetyTimer);
      }
    }, 2000);

    function cleanup() {
      clearInterval(safetyTimer);
      sceneListening = false;
      mic.classList.remove('mic-listening');
      if (recognitionInstance === rec) {
        rec.onresult = null;
        rec.onerror = null;
        rec.onend = null;
        recognitionInstance = null;
      }
    }

    function resolveOnce(value) {
      if (sessionId !== listenSessionId) return;
      cleanup();
      resolve(value);
    }

    rec.onresult = (event) => {
      if (sessionId !== listenSessionId) return;
      lastResultTime = Date.now();
      let interim = '';
      finalTranscript = '';
      for (let i = 0; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript;
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      input.value = finalTranscript + interim;
    };

    rec.onerror = (e) => {
      if (sessionId !== listenSessionId) return;
      resolveOnce(finalTranscript || input.value || null);
    };

    rec.onend = () => {
      if (sessionId !== listenSessionId) return;
      resolveOnce(finalTranscript || input.value || null);
    };

    try {
      rec.start();
    } catch (e) {
      cleanup();
      resolve(null);
    }
  });
}

// ── Unified entry point ──
async function listenForSpeech() {
  if (isMobile) {
    if (sceneListening && mobileRecorder) {
      // Stop recording and transcribe
      return await stopAndTranscribeWhisper();
    } else {
      // Start recording — no transcript yet
      await startMobileRecording();
      return null;
    }
  } else {
    return listenWebSpeech();
  }
}

function stopListening() {
  listenSessionId++;
  sceneListening = false;
  // Mobile cleanup (discard, don't transcribe)
  if (mobileRecorder) {
    try { if (mobileRecorder.state === 'recording') mobileRecorder.stop(); } catch (e) {}
  }
  if (mobileStream) {
    mobileStream.getTracks().forEach(t => t.stop());
    mobileStream = null;
  }
  mobileRecorder = null;
  mobileChunks = [];
  // Desktop cleanup
  if (recognitionInstance) {
    try { recognitionInstance.stop(); } catch (e) {}
    recognitionInstance.onresult = null;
    recognitionInstance.onerror = null;
    recognitionInstance.onend = null;
    recognitionInstance = null;
  }
  const mic = document.getElementById('scene-mic');
  if (mic) mic.classList.remove('mic-listening');
}

// ══════════════════════════════════════════════════════
// Scene Engine (Action mode)
// ══════════════════════════════════════════════════════
let sceneState = null; // { scenario, exchangeIdx, results[], nudgeTimer, moveOnTimer }

function startScene(scenario) {
  sceneState = {
    scenario,
    exchangeIdx: 0,
    results: [],
    nudgeTimer: null,
    moveOnTimer: null,
  };

  // Ensure FSRS cards for all prereqs
  const fsrsState = loadFSRSState();
  for (const p of scenario.prereqs) {
    const key = `scene_${scenario.id}_${p.id}`;
    if (!fsrsState[key]) {
      fsrsState[key] = createCard(key, 'scene');
    }
  }
  saveFSRSState(fsrsState);

  document.getElementById('scene-setting-header').textContent = scenario.setting;
  showView('view-scene');
  renderSceneExchange();
}

function renderSceneExchange() {
  const { scenario, exchangeIdx } = sceneState;
  const ex = scenario.exchanges[exchangeIdx];
  if (!ex) { endScene(); return; }

  // Clear previous state
  clearSceneTimers();
  const input = document.getElementById('scene-input');
  const feedback = document.getElementById('scene-feedback');
  const nudge = document.getElementById('scene-nudge');
  const nextBtn = document.getElementById('scene-next');
  const inputGroup = document.getElementById('scene-input-group');

  input.value = '';
  input.disabled = false;
  input.classList.remove('input-correct', 'input-correct-fast', 'input-incorrect', 'input-evaluating');
  feedback.classList.add('hidden');
  feedback.innerHTML = '';
  nudge.classList.add('hidden');
  nextBtn.classList.add('hidden');
  inputGroup.classList.remove('hidden');

  // Lock input during TTS
  const sceneExchange = document.getElementById('scene-exchange');
  sceneExchange.classList.add('scene-input-locked');

  // Populate
  document.getElementById('scene-speaker').textContent = ex.speaker === 'friend' ? 'Yuki' : '';
  document.getElementById('scene-line').textContent = ex.line;
  document.getElementById('scene-line-reading').textContent = ex.lineReading;
  document.getElementById('scene-line-en').textContent = ex.lineEn || '';
  document.getElementById('scene-prompt').textContent = ex.prompt;
  document.getElementById('scene-progress').textContent = `${exchangeIdx + 1} / ${scenario.exchanges.length}`;

  // Play Yuki's line, then unlock input and start timers
  playYukiLine(ex.line).then(() => {
    sceneExchange.classList.remove('scene-input-locked');
    input.focus();

    sceneState.nudgeTimer = setTimeout(() => {
      nudge.textContent = ex.nudge;
      nudge.classList.remove('hidden');
    }, 20000);

    sceneState.moveOnTimer = setTimeout(() => {
      if (!input.disabled) {
        submitSceneResponse('');
      }
    }, 35000);
  });
}

function clearSceneTimers() {
  if (sceneState.nudgeTimer) { clearTimeout(sceneState.nudgeTimer); sceneState.nudgeTimer = null; }
  if (sceneState.moveOnTimer) { clearTimeout(sceneState.moveOnTimer); sceneState.moveOnTimer = null; }
  if (ttsAudioElement) { ttsAudioElement.pause(); ttsAudioElement = null; }
  stopListening();
}

function normalizeJapanese(str) {
  return str.replace(/[\s！？!?、。,.\u3000]/g, '').toLowerCase();
}

async function submitSceneResponse(userInput) {
  clearSceneTimers();
  const { scenario, exchangeIdx } = sceneState;
  const ex = scenario.exchanges[exchangeIdx];
  const input = document.getElementById('scene-input');
  const feedback = document.getElementById('scene-feedback');
  const nextBtn = document.getElementById('scene-next');

  input.disabled = true;

  const normalized = normalizeJapanese(romajiToKana(userInput));
  const isEmpty = normalized.length === 0;

  // ── Try AI evaluation first, fall back to accept-lists ──
  let isMatch, closeMsg, feedbackText, rating;
  let aiResult = null;

  if (!isEmpty) {
    input.classList.add('input-evaluating');
    // Show wave animation while AI evaluates
    feedback.innerHTML = '<div class="ai-loading"><svg height="60" viewBox="0 0 1200 60" fill="none" preserveAspectRatio="none"><path class="ai-wave" d="M0 30 Q75 15 150 30 T300 30 T450 30 T600 30 T750 30 T900 30 T1050 30 T1200 30" stroke="rgba(200,196,188,0.4)" stroke-width="0.75" fill="none"/></svg></div>';
    feedback.classList.remove('hidden');
    aiResult = await evaluateWithAI(ex, scenario, userInput, normalized);
    input.classList.remove('input-evaluating');
  }

  if (aiResult) {
    isMatch = aiResult.acceptable;
    closeMsg = aiResult.registerError;
    feedbackText = aiResult.feedback;
    rating = aiResult.rating === 'GOOD' ? GOOD : aiResult.rating === 'HARD' ? HARD : AGAIN;
  } else {
    // Fallback: accept-list matching
    isMatch = ex.accepts.some(a => normalizeJapanese(a) === normalized);
    closeMsg = null;
    if (!isMatch && !isEmpty && ex.feedback.close) {
      for (const c of ex.feedback.close) {
        if (normalized.includes(normalizeJapanese(c.pattern))) {
          closeMsg = c.msg;
          break;
        }
      }
    }
    feedbackText = null;
    rating = isEmpty ? AGAIN : isMatch ? (closeMsg ? HARD : GOOD) : AGAIN;
  }

  // Visual feedback on input
  if (isEmpty) {
    // Timed out — no input styling
  } else if (isMatch) {
    input.classList.add('input-correct');
  } else {
    input.classList.add('input-incorrect');
  }

  // Build feedback HTML
  let fbHtml = '';
  if (isEmpty) {
    fbHtml += `<div class="fb-yours">You didn't respond.</div>`;
    fbHtml += `<div class="fb-best">${ex.best}</div>`;
    fbHtml += `<div class="fb-note">${ex.feedback.miss}</div>`;
  } else if (isMatch && !closeMsg) {
    fbHtml += `<div class="fb-note">${feedbackText || ex.feedback.correct}</div>`;
  } else if (closeMsg) {
    fbHtml += `<div class="fb-yours">You said: ${userInput}</div>`;
    fbHtml += `<div class="fb-best">${ex.best}</div>`;
    fbHtml += `<div class="fb-note">${closeMsg}</div>`;
  } else {
    fbHtml += `<div class="fb-yours">You said: ${userInput}</div>`;
    fbHtml += `<div class="fb-best">${ex.best}</div>`;
    fbHtml += `<div class="fb-note">${feedbackText || ex.feedback.miss}</div>`;
  }

  feedback.innerHTML = fbHtml;
  feedback.classList.remove('hidden');

  // FSRS: find the closest prereq and rate it
  const matchedPrereq = scenario.prereqs.find(p => {
    return ex.accepts.some(a => normalizeJapanese(a).includes(normalizeJapanese(p.japanese)));
  });
  if (matchedPrereq) {
    const fsrsKey = `scene_${scenario.id}_${matchedPrereq.id}`;
    ensureHiraFSRSCard(fsrsKey);
    updateFSRSCard(fsrsKey, rating);
  }

  // Record result
  sceneState.results.push({
    exchangeIdx,
    userInput: userInput || '(no response)',
    isMatch,
    isEmpty,
    closeMsg,
    best: ex.best,
    line: ex.line,
    lineEn: ex.lineEn,
    rating,
    aiEvaluated: !!aiResult,
  });

  // Always show next button — let the learner sit with the feedback
  nextBtn.classList.remove('hidden');
}

function endScene() {
  clearSceneTimers();
  const { scenario, results } = sceneState;
  const correct = results.filter(r => r.isMatch).length;
  const missed = results.filter(r => !r.isMatch).length;
  const total = results.length;

  // Message
  const msgEl = document.getElementById('scene-results-message');
  if (correct === total) {
    msgEl.textContent = 'You handled it naturally.';
  } else if (correct >= total / 2) {
    msgEl.textContent = `${correct}/${total}. Some rough spots.`;
  } else {
    msgEl.textContent = `${correct}/${total}. Now you know what to drill.`;
  }

  // Show/hide "drill missed" button
  const drillMissedBtn = document.getElementById('btn-scene-drill-missed');
  if (missed > 0) {
    drillMissedBtn.textContent = missed === 1 ? 'drill missed phrase' : `drill ${missed} missed phrases`;
    drillMissedBtn.classList.remove('hidden');
  } else {
    drillMissedBtn.classList.add('hidden');
  }

  // Build results list
  const listEl = document.getElementById('scene-results-list');
  let html = '';
  for (const r of results) {
    const cls = r.isMatch ? 'correct' : 'missed';
    html += `<div class="scene-result-item">`;
    html += `<div class="sr-speaker">Yuki</div>`;
    html += `<div class="sr-line">${r.line}</div>`;
    html += `<div class="sr-yours ${cls}">You: ${r.userInput}</div>`;
    if (!r.isMatch) {
      html += `<div class="sr-best">→ ${r.best}</div>`;
    }
    html += `</div>`;
  }
  listEl.innerHTML = html;

  showView('view-scene-results');
}

// Scene event listeners
document.getElementById('btn-enter-scene').addEventListener('click', () => {
  if (!getActiveProfile()) return;
  startScene(scenarios[0]);
});

document.getElementById('scene-submit').addEventListener('click', () => {
  const input = document.getElementById('scene-input');
  if (!input.disabled) submitSceneResponse(input.value.trim());
});

document.getElementById('scene-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const input = document.getElementById('scene-input');
    if (!input.disabled) submitSceneResponse(input.value.trim());
  }
});

document.getElementById('scene-next').addEventListener('click', () => {
  sceneState.exchangeIdx++;
  renderSceneExchange();
});

document.getElementById('scene-mic').addEventListener('click', async () => {
  const input = document.getElementById('scene-input');
  if (input.disabled) return;
  const sceneExchange = document.getElementById('scene-exchange');
  if (sceneExchange.classList.contains('scene-input-locked')) return;

  // If already listening, listenForSpeech toggles off and resolves
  // Don't auto-submit — let user review, retry, or submit manually
  const transcript = await listenForSpeech();
  if (transcript) {
    input.value = transcript;
    input.focus();
  }
});

document.getElementById('btn-scene-retry').addEventListener('click', () => {
  startScene(scenarios[0]);
});

document.getElementById('btn-scene-home').addEventListener('click', () => {
  renderStartScreen();
  showView('view-start');
});

document.getElementById('btn-scene-drill-missed').addEventListener('click', () => {
  // Collect ALL prereq IDs that match missed exchanges
  const { scenario, results } = sceneState;
  const missedPrereqIds = [];
  for (const r of results) {
    if (!r.isMatch) {
      const ex = scenario.exchanges[r.exchangeIdx];
      // Find ALL prereqs whose japanese appears in any accept for this exchange
      for (const p of scenario.prereqs) {
        const normPrereq = normalizeJapanese(p.japanese);
        const found = ex.accepts.some(a => normalizeJapanese(a).includes(normPrereq));
        if (found && !missedPrereqIds.includes(p.id)) {
          missedPrereqIds.push(p.id);
        }
      }
    }
  }
  if (missedPrereqIds.length === 0) return;
  drillFromScene = true;
  exercises = generateScenarioDrill(scenario, missedPrereqIds);
  currentIndex = 0;
  sessionResults = [];
  answered = false;
  reinforceQueue = [];
  correctStreak = 0;
  progressFill.classList.remove('final-stretch');
  const log = document.getElementById('session-review-log');
  if (log) log.innerHTML = '';
  showView('view-session');
  renderExercise();
});

document.getElementById('btn-enter-scene-after-drill').addEventListener('click', () => {
  startScene(scenarios[0]);
});

// ══════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════
renderStartScreen();
renderLessonSelector();
showView('view-start');

// Service Worker — force update on version change
const APP_VERSION = 12;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    // Nuke all old SWs and caches, then re-register
    const stored = localStorage.getItem('renshu-sw-version');
    if (stored && parseInt(stored) < APP_VERSION) {
      Promise.all([
        ...regs.map(r => r.unregister()),
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
      ]).then(() => {
        localStorage.setItem('renshu-sw-version', APP_VERSION);
        location.reload();
      });
      return;
    }
    localStorage.setItem('renshu-sw-version', APP_VERSION);
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
